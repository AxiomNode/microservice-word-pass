name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-test-lint-audit:
    name: Build, Test, Lint, Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: microservice-wordpass/src
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: microservice-wordpass

      - name: Validate cross-repo token
        run: |
          if [[ -z "${{ secrets.CROSS_REPO_READ_TOKEN }}" ]]; then
            echo "CROSS_REPO_READ_TOKEN is required to checkout AxiomNode/shared-sdk-client in CI."
            exit 1
          fi

      - name: Checkout shared-sdk-client
        uses: actions/checkout@v4
        with:
          repository: AxiomNode/shared-sdk-client
          path: shared-sdk-client
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}

      - name: Enforce tracked artifact policy
        working-directory: microservice-wordpass
        run: |
          set -euo pipefail
          forbidden=$(git ls-files | grep -E '(^|/)src/(node_modules|dist)/' || true)
          if [[ -n "${forbidden}" ]]; then
            echo "Forbidden tracked artifacts detected in repository index:"
            echo "${forbidden}"
            exit 1
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: microservice-wordpass/src/package-lock.json

      - name: Build shared SDK package
        working-directory: shared-sdk-client/typescript
        run: |
          npm ci
          npx tsc -p tsconfig.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test coverage
        run: npm run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: microservice-wordpass/src/coverage/lcov.info
          flags: microservice-wordpass
          fail_ci_if_error: false

      - name: Lint
        run: npm run lint

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  trigger-platform-infra-build:
    name: Trigger Platform Infra Build
    runs-on: ubuntu-latest
    needs:
      - build-test-lint-audit
      - docker-smoke-private-docs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect runtime-relevant changes
        id: dispatch_scope
        run: |
          set -euo pipefail

          BASE_SHA="${{ github.event.before }}"
          HEAD_SHA="${{ github.sha }}"
          if [[ -n "${BASE_SHA}" && "${BASE_SHA}" != "0000000000000000000000000000000000000000" ]]; then
            CHANGED=$(git diff --name-only "${BASE_SHA}" "${HEAD_SHA}")
          else
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD)
          fi

          NON_DOC=$(printf '%s\n' "${CHANGED}" | grep -Ev '^(docs/|\.github/|README\.md$|AGENTS\.md$|LICENSE$|CONTRIBUTING\.md$)|\.md$' || true)
          if [[ -z "${NON_DOC}" ]]; then
            echo "should_dispatch=false" >> "$GITHUB_OUTPUT"
            echo "Docs-only change detected; skipping platform-infra dispatch."
          else
            echo "should_dispatch=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Dispatch build-push in platform-infra
        if: steps.dispatch_scope.outputs.should_dispatch == 'true'
        env:
          DISPATCH_TOKEN: ${{ secrets.PLATFORM_INFRA_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${DISPATCH_TOKEN}" ]]; then
            echo "PLATFORM_INFRA_DISPATCH_TOKEN is required to trigger platform-infra workflow."
            exit 1
          fi

          STATUS_CODE=$(curl -sS -o /tmp/dispatch_response.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/AxiomNode/platform-infra/actions/workflows/build-push.yaml/dispatches \
            -d '{"ref":"main","inputs":{"service":"microservice-wordpass"}}')

          if [[ "${STATUS_CODE}" != "204" ]]; then
            echo "Failed to dispatch platform-infra workflow (HTTP ${STATUS_CODE})."
            cat /tmp/dispatch_response.json
            exit 1
          fi

          echo "Dispatched platform-infra Build & Push for microservice-wordpass."

      - name: Skip platform-infra dispatch for docs-only changes
        if: steps.dispatch_scope.outputs.should_dispatch != 'true'
        run: echo "Skipping platform-infra dispatch because this push only changed documentation or workflow files."

  docker-smoke-private-docs:
    name: Docker Smoke + Private Docs
    runs-on: ubuntu-latest
    needs:
      - build-test-lint-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: microservice-wordpass

      - name: Validate cross-repo token
        run: |
          if [[ -z "${{ secrets.CROSS_REPO_READ_TOKEN }}" ]]; then
            echo "CROSS_REPO_READ_TOKEN is required to checkout shared workspace dependencies in Docker smoke."
            exit 1
          fi

      - name: Checkout shared-sdk-client
        uses: actions/checkout@v4
        with:
          repository: AxiomNode/shared-sdk-client
          path: shared-sdk-client
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}

      - name: Checkout contracts-and-schemas
        uses: actions/checkout@v4
        with:
          repository: AxiomNode/contracts-and-schemas
          path: contracts-and-schemas
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}

      - name: Prepare env file
        run: |
          cp microservice-wordpass/src/.env.example microservice-wordpass/src/.env
          : > microservice-wordpass/src/.env.secrets

      - name: Start stack
        run: docker compose -f microservice-wordpass/docker-compose.yml up -d --build

      - name: Wait for health endpoint
        run: |
          python - <<'PY'
          import time
          import urllib.request

          url = 'http://localhost:7101/health'
          deadline = time.time() + 240
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=5) as r:
                      if r.getcode() == 200:
                          raise SystemExit(0)
              except Exception:
                  pass
              time.sleep(4)
          raise SystemExit('Health check timeout for wordpass service')
          PY

      - name: Check private docs auth behavior
        run: |
          python - <<'PY'
          import urllib.error
          import urllib.request

          url = 'http://localhost:7101/private/docs/json'
          token = 'wordpass_private_docs_token'

          req = urllib.request.Request(url)
          try:
              urllib.request.urlopen(req, timeout=8)
              raise SystemExit('Expected 401 without token')
          except urllib.error.HTTPError as e:
              if e.code != 401:
                  raise SystemExit(f'Expected 401 without token, got {e.code}')

          req = urllib.request.Request(url, headers={'X-Private-Docs-Token': token})
          with urllib.request.urlopen(req, timeout=8) as r:
              if r.getcode() != 200:
                  raise SystemExit(f'Expected 200 with token, got {r.getcode()}')
          PY

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f microservice-wordpass/docker-compose.yml logs --no-color || true

      - name: Stop stack
        if: always()
        run: docker compose -f microservice-wordpass/docker-compose.yml down -v
