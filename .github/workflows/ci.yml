name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
  workflow_dispatch:

jobs:
  build-test-lint-audit:
    name: Build, Test, Lint, Audit
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Lint
        run: npm run lint

      - name: Audit production dependencies
        run: npm audit --omit=dev

  trigger-platform-infra-build:
    name: Trigger Platform Infra Build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Dispatch build-push in platform-infra
        env:
          DISPATCH_TOKEN: ${{ secrets.PLATFORM_INFRA_DISPATCH_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${DISPATCH_TOKEN}" ]]; then
            echo "PLATFORM_INFRA_DISPATCH_TOKEN is required to trigger platform-infra workflow."
            exit 1
          fi

          STATUS_CODE=$(curl -sS -o /tmp/dispatch_response.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/AxiomNode/platform-infra/actions/workflows/build-push.yaml/dispatches \
            -d '{"ref":"main","inputs":{"service":"microservice-wordpass"}}')

          if [[ "${STATUS_CODE}" != "204" ]]; then
            echo "Failed to dispatch platform-infra workflow (HTTP ${STATUS_CODE})."
            cat /tmp/dispatch_response.json
            exit 1
          fi

          echo "Dispatched platform-infra Build & Push for microservice-wordpass."

  docker-smoke-private-docs:
    name: Docker Smoke + Private Docs
    runs-on: ubuntu-latest
    needs:
      - build-test-lint-audit
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare env file
        run: cp src/.env.example src/.env

      - name: Start stack
        run: docker compose -f docker-compose.yml up -d --build

      - name: Wait for health endpoint
        run: |
          python - <<'PY'
          import time
          import urllib.request

          url = 'http://localhost:7101/health'
          deadline = time.time() + 240
          while time.time() < deadline:
              try:
                  with urllib.request.urlopen(url, timeout=5) as r:
                      if r.getcode() == 200:
                          raise SystemExit(0)
              except Exception:
                  pass
              time.sleep(4)
          raise SystemExit('Health check timeout for wordpass service')
          PY

      - name: Check private docs auth behavior
        run: |
          python - <<'PY'
          import urllib.error
          import urllib.request

          url = 'http://localhost:7101/private/docs/json'
          token = 'wordpass_private_docs_token'

          req = urllib.request.Request(url)
          try:
              urllib.request.urlopen(req, timeout=8)
              raise SystemExit('Expected 401 without token')
          except urllib.error.HTTPError as e:
              if e.code != 401:
                  raise SystemExit(f'Expected 401 without token, got {e.code}')

          req = urllib.request.Request(url, headers={'X-Private-Docs-Token': token})
          with urllib.request.urlopen(req, timeout=8) as r:
              if r.getcode() != 200:
                  raise SystemExit(f'Expected 200 with token, got {r.getcode()}')
          PY

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml logs --no-color || true

      - name: Stop stack
        if: always()
        run: docker compose -f docker-compose.yml down -v
